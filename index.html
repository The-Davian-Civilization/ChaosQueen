<!DOCTYPE html>
<html>
<head>
<style>
  .page-container {
    background-color: #000000; 
    padding: 20px; 
    min-height: 100vh;
  }

  .grid-container {
    display: grid;
    grid-template-columns: repeat(3, 1fr); /* 3 equal columns */
    gap: 10px;
    max-width: 800px; /* Made this a little wider so things aren't squished */
    margin: 0 auto; 
  }

  .container {
    display: flex;
    justify-content: center;
    align-items: center;
    background: pink;
    border: 1px solid black;
    min-width: 0;
    overflow: hidden;
    min-height: 150px; /* Giving them a good height so the sites aren't cut off */
  }

  /* Makes iframes fill the pink boxes completely */
  .container iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* Makes the text in Item 4 bigger and easier to read */
  .container p {
    text-align: center;
    width: 100%;
    margin: 0;
    font-size: 20px; 
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="page-container">
  <div class="grid-container">
    
    <div class="container"><iframe src="https://vclock.com" frameborder="0"></iframe></div>

    <div class="container"><iframe src="https://davi-combs.github.io/purplepassion/" frameborder="0"></iframe></div>
    
    <div class="container"><iframe src="https://davi-combs.github.io/Minesweeper/" frameborder="0"></iframe></div>
    
    <div class="container"><p>Item 4</p></div>
    
    <div class="container"><iframe src="https://davi-combs.github.io/Forddcombs/" frameborder="0"></iframe></div>
    
    <div class="container"><iframe src="https://www.meteoblue.com/en/weather/maps/widget/evansville_united-states_4257227?windAnimation=1&gust=1&satellite=1&cloudsAndPrecipitation=1&temperature=1&sunshine=1&extremeForecastIndex=1&geoloc=fixed&tempunit=F&lengthunit=metric&windunit=mph&zoom=8&autowidth=auto&user_key=3333e7ecbbbd986b&embed_key=273ffe368f5218d8&sig=85fb6277c06bb043f01ea0c9cc464de648defbafc56a24bc2a8de3ab1934d2b7" frameborder="0" scrolling="NO" allowtransparency="true" sandbox="allow-same-origin allow-scripts allow-popups allow-popups-to-escape-sandbox"></iframe></div>
    
    <div class="container"><iframe src="https://www.wikipedia.org" frameborder="0"></iframe></div>
    
    <div class="container"><iframe src="https://widgetbot.io" frameborder="0"></iframe></div>
    
    <div class="container">
      <widgetbot server="1191728009644879993"></widgetbot>
      <script src="https://cdn.jsdelivr.net/npm/@widgetbot/html-embed"></script>
    </div>

  </div>
</div>

</body>
</html>
